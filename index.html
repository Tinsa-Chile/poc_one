<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santander — Banca en Línea</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Paleta 100% Santander — sin azules */
      --red: #EC0000;
      --red-dark: #c40000;
      --red-light: #fff0f0;
      --red-mid: #ffd6d6;
      --green: #00843D;
      --green-bg: #edf7f2;
      --green-dark: #006830;
      --text: #1a1a1a;
      --text-2: #4a4a4a;
      --text-3: #7a7a7a;
      --text-4: #b0b0b0;
      --border: #e6e6e4;
      --bg: #f2f2f0;
      --white: #ffffff;
      --surface: #f7f7f5;
      --surface-2: #efefed;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: var(--bg);
    }

    /* ── PAGES ─────────────────────────────────────────────── */
    .page {
      display: none;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #page-login.active {
      flex-direction: row;
      min-height: 100vh;
    }

    /* ══════════════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════════════ */
    .login-left {
      width: 45%;
      background: var(--red);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px;
      position: relative;
      overflow: hidden;
    }

    .login-left::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
    }

    .login-left-logo {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      position: relative;
    }

    .login-left-tagline {
      color: rgba(255, 255, 255, 0.9);
      font-size: 36px;
      font-weight: 300;
      line-height: 1.25;
      max-width: 300px;
      position: relative;
    }

    .login-left-footer {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      position: relative;
    }

    .login-right {
      flex: 1;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
    }

    .login-box h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-3);
      margin-bottom: 36px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0de;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      background: var(--white);
    }

    .field input:focus {
      border-color: var(--red);
    }

    .field input.err {
      border-color: var(--red);
      background: var(--red-light);
    }

    .error-msg {
      font-size: 12px;
      color: var(--red);
      margin-top: 6px;
      font-weight: 500;
      min-height: 18px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.1px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--red-dark);
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.985);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ══════════════════════════════════════════════════════
   DASHBOARD SHELL
══════════════════════════════════════════════════════ */
    .header {
      background: var(--red);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .header-logo {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-rut {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
    }

    .btn-salir {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .btn-salir:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .tabs {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 48px;
      position: sticky;
      top: 56px;
      z-index: 99;
      flex-shrink: 0;
    }

    .tab {
      padding: 16px 24px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-3);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    .body {
      padding: 32px 48px 72px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* selector créditos */
    .creditos-selector {
      display: flex;
      gap: 14px;
      margin-bottom: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .creditos-selector::-webkit-scrollbar {
      display: none;
    }

    .credito-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 22px;
      min-width: 210px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .credito-card.selected {
      border-color: var(--red);
      background: var(--red-light);
    }

    .credito-card:hover:not(.selected) {
      border-color: #c8c8c5;
    }

    .cc-tipo {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
      margin-bottom: 5px;
    }

    .cc-num {
      font-size: 16px;
      font-weight: 600;
    }

    .cc-icon {
      width: 38px;
      height: 38px;
      background: var(--red-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      padding-top: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d0d0ce;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active {
      background: var(--red);
    }

    /* ── SECCIÓN BANCO ─────────────────────────────────── */
    .sec-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-4);
      margin-bottom: 10px;
    }

    .monto-pendiente {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 18px;
    }

    .monto-pendiente strong {
      font-size: 30px;
      color: var(--text);
      font-weight: 700;
      display: block;
      margin-top: 2px;
      letter-spacing: -0.5px;
    }

    .tabla {
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 28px;
    }

    .tabla-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 24px;
      border-bottom: 1px solid #f2f2f0;
      font-size: 14px;
    }

    .tabla-row:last-child {
      border-bottom: none;
    }

    .tr-label {
      color: var(--text-2);
    }

    .tr-value {
      font-weight: 600;
      color: var(--text);
    }

    /* ── HERO TINSA ─────────────────────────────────────── */
    .hero-tinsa {
      background: var(--white);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .hero-tinsa-top {
      background: #1a1a1a;
      padding: 28px 36px 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-tinsa-top::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
    }

    .hero-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .hero-powered {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-powered::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.25);
    }

    .hero-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .hero-valor-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .hero-valor-uf {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }

    .hero-valor-pesos {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 300;
    }

    .hero-delta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 132, 61, 0.25);
      border: 1px solid rgba(0, 132, 61, 0.4);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #4dcc8a;
      margin-top: 14px;
    }

    .hero-tinsa-bottom {
      padding: 24px 36px 28px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .hero-bottom-left {
      flex: 1;
    }

    .hero-cta-label {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .hero-cta-monto {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.8px;
      color: var(--red);
      margin-bottom: 2px;
    }

    .hero-cta-pesos {
      font-size: 14px;
      color: var(--text-3);
      font-weight: 300;
    }

    .hero-bottom-right {
      background: var(--red-light);
      border: 1.5px solid var(--red-mid);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      flex-shrink: 0;
      min-width: 200px;
    }

    .hero-br-label {
      font-size: 11px;
      color: var(--red);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-br-cta {
      width: 100%;
      padding: 10px 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .hero-br-cta:hover {
      background: var(--red-dark);
    }

    .hero-cta-sub {
      font-size: 11px;
      color: var(--text-4);
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ── LIQUIDEZ INVERTIDA ─────────────────────────────── */
    .card-section {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 30px;
      margin-bottom: 24px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 16px;
    }

    .section-head h3 {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.3;
    }

    .section-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 3px;
      font-weight: 300;
    }

    /* cuota ancla */
    .cuota-ancla {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cuota-ancla-icon {
      font-size: 20px;
    }

    .cuota-ancla-text {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.5;
    }

    .cuota-ancla-text strong {
      color: var(--text);
      font-weight: 700;
    }

    /* comparación visual */
    .liq-compare {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .liq-col {
      border-radius: 14px;
      padding: 22px 20px;
      border: 2px solid var(--border);
    }

    .liq-col.winner {
      border-color: var(--green);
      background: var(--green-bg);
    }

    .liq-col.loser {
      background: var(--surface);
      opacity: 0.85;
    }

    .liq-col-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .liq-col.winner .liq-col-tag {
      color: var(--green);
    }

    .liq-col.loser .liq-col-tag {
      color: var(--text-4);
    }

    .liq-col-tipo {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .liq-col-monto-label {
      font-size: 11px;
      color: var(--text-4);
      margin-bottom: 4px;
    }

    .liq-col-monto {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .liq-col.winner .liq-col-monto {
      color: var(--green);
    }

    .liq-col.loser .liq-col-monto {
      color: var(--text-3);
      text-decoration: line-through;
      text-decoration-color: var(--red);
    }

    .liq-col-pesos {
      font-size: 13px;
      margin-top: 3px;
    }

    .liq-col.winner .liq-col-pesos {
      color: var(--green-dark);
    }

    .liq-col.loser .liq-col-pesos {
      color: var(--text-4);
    }

    .liq-vs-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-4);
    }

    .liq-vs-label-center {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .liq-vs-arrow {
      font-size: 22px;
    }

    .liq-conclusion {
      background: var(--green-bg);
      border: 1.5px solid var(--green);
      border-radius: 12px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .liq-conclusion-text {
      font-size: 14px;
      color: var(--green-dark);
      line-height: 1.5;
      font-weight: 500;
    }

    .liq-conclusion-text span {
      font-size: 11px;
      font-weight: 400;
      display: block;
      margin-top: 2px;
      color: var(--green);
      opacity: 0.8;
    }

    .liq-conclusion-num {
      text-align: right;
      flex-shrink: 0;
    }

    .liq-conclusion-uf {
      font-size: 24px;
      font-weight: 700;
      color: var(--green);
    }

    .liq-conclusion-pesos {
      font-size: 13px;
      color: var(--green-dark);
    }

    /* ── ACCIONES ───────────────────────────────────────── */
    .acciones-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .accion-card {
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 26px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .accion-card:hover {
      border-color: var(--red);
      background: var(--red-light);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(236, 0, 0, 0.1);
    }

    .accion-icon {
      font-size: 34px;
      margin-bottom: 12px;
    }

    .accion-titulo {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .accion-desc {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 18px;
    }

    .accion-btn {
      width: 100%;
      padding: 11px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .accion-btn:hover {
      background: var(--red-dark);
    }

    /* ── PROYECTOS ──────────────────────────────────────── */
    .proy-header {
      margin-bottom: 20px;
    }

    .proy-header h3 {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .proy-header p {
      font-size: 13px;
      color: var(--text-3);
    }

    .proy-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .proy-item:hover {
      border-color: #c8c8c5;
    }

    .proy-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: var(--white);
      transition: background 0.15s;
      gap: 16px;
    }

    .proy-trigger:hover {
      background: var(--surface);
    }

    .proy-trigger.open {
      background: var(--green-bg);
      border-bottom: 1px solid var(--border);
    }

    .proy-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .proy-thumb {
      width: 64px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
    }

    .proy-nombre {
      font-size: 15px;
      font-weight: 600;
    }

    .proy-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .proy-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .proy-precio {
      font-size: 14px;
      font-weight: 600;
      text-align: right;
    }

    .proy-canon {
      font-size: 11px;
      color: var(--text-4);
      margin-top: 2px;
    }

    .proy-chevron {
      font-size: 14px;
      color: var(--text-4);
      transition: transform 0.25s, color 0.2s;
    }

    .proy-chevron.open {
      transform: rotate(180deg);
      color: var(--green);
    }

    .proy-body {
      padding: 22px;
      background: var(--surface);
      display: grid;
      grid-template-columns: repeat(3, 1fr) 1.4fr;
      gap: 12px;
      align-items: start;
      animation: slideDown 0.22s ease;

      font-weight: 700;
      font-size: 14px;
      margin-top: 4px;
      padding-top: 10px;
    }

    .f-pos {
      color: var(--green);
      font-weight: 600;
    }

    .f-neg {
      color: var(--red);
      font-weight: 600;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 999;
      animation: fadeUp 0.3s ease forwards;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* responsive */
    @media (max-width: 768px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 32px 24px;
      }

      .header,
      .tabs,
      .body {
        padding-left: 20px;
        padding-right: 20px;
      }

      .hero-tinsa {
        padding: 28px 24px;
      }

      .hero-valor-uf {
        font-size: 38px;
      }

      .hero-cta-monto {
        font-size: 28px;
      }

      .liq-anchor {
        flex-direction: column;
        align-items: flex-start;
      }

      .liq-anchor-right {
        width: 100%;
      }

      .liq-vs-row {
        flex-direction: column;
      }

      .acciones-grid {
        grid-template-columns: 1fr;
      }

      .proy-body {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- ══ LOGIN ══════════════════════════════════════════════ -->
  <div class="page active" id="page-login">
    <div class="login-left">
      <div class="login-left-logo">Santander</div>

  <!-- ══ DASHBOARD ══════════════════════════════════════════ -->
  <div class="page" id="page-dash">
    <header class="header">
      <div class="header-logo">Santander</div>
      <div class="header-right">

        <button class="btn-salir" onclick="logout()">Cerrar sesión</button>
      </div>
    </header>
    <div class="tabs">
      <div class="tab active">Mi Crédito</div>
      <div class="tab">Cuotas a Pagar</div>
      <div class="tab">Histórico de Pagos</div>

    <div class="body">
      <div class="creditos-selector">
        <div class="credito-card selected" onclick="selectCredito(0)">
          <div>
            <div class="cc-tipo">Crédito Hipotecario</div>

  <script>
    /* ── CREDENCIALES ────────────────────────────────────── */
    const VALID = { rut: '8711582-8', clave: 'Tinsa0987' }

    /* ── LOGIN ───────────────────────────────────────────── */
    const rutEl = document.getElementById('inp-rut')
    const claveEl = document.getElementById('inp-clave')
    const btnEl = document.getElementById('btn-ingresar')
    const errEl = document.getElementById('login-error')

    function formatRut(v) {
      const c = v.replace(/[^0-9kK]/g, '')
      if (c.length < 2) return c
      return c.slice(0, -1) + '-' + c.slice(-1).toUpperCase()
    }
    rutEl.addEventListener('input', e => {
      e.target.value = formatRut(e.target.value)
      errEl.textContent = ''
      rutEl.classList.remove('err'); claveEl.classList.remove('err')
      syncBtn()
    })
    claveEl.addEventListener('input', () => { errEl.textContent = ''; syncBtn() })
    claveEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin() })
    rutEl.addEventListener('keydown', e => { if (e.key === 'Enter') claveEl.focus() })

    function syncBtn() { btnEl.disabled = !rutEl.value || !claveEl.value }

    function handleLogin() {
      if (btnEl.disabled) return
      btnEl.innerHTML = '<span class="spinner"></span>Verificando...'
      btnEl.disabled = true
      setTimeout(() => {
        if (rutEl.value.trim() === VALID.rut && claveEl.value === VALID.clave) {
          document.getElementById('dash-rut').textContent = rutEl.value.trim()
          showPage('page-dash')
          selectCredito(0)
        } else {
          errEl.textContent = 'RUT o clave incorrectos. Verifica tus datos.'
          rutEl.classList.add('err'); claveEl.classList.add('err')
          btnEl.innerHTML = 'Ingresar'
          btnEl.disabled = false
        }
      }, 900)
    }

    function logout() {
      rutEl.value = ''; claveEl.value = ''
      errEl.textContent = ''
      rutEl.classList.remove('err'); claveEl.classList.remove('err')
      btnEl.innerHTML = 'Ingresar'; btnEl.disabled = true
      showPage('page-login')
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
      document.getElementById(id).classList.add('active')
    }

    /* ── DATOS ───────────────────────────────────────────── */
    const UF = 39841.72

    const CREDITOS = [
      {
        detalle: { pendiente: 'UF 1.793,25', otorgado: 'UF 3.700,50', dividendo: 'UF 23,21', tasa: '4.4%', cobertura: '80%' },
        val: {
          orig: 'UF 5.060,00', orig_fecha: '2013-10-10',
          actual_num: 5348, actual: 'UF 5.348,00', actual_fecha: '2026-03-06',

        },
        liq: {
          disponible_num: 2485.15,
          disponible: 'UF 2.485,15',
          rehip_tasa: 4.4,
          rehip_plazo: '20 años · tasa 4.4% anual',
          rehip_cuota_num: 15.59,
          rehip_cuota: 'UF 15,59',
          rehip_pesos: '$621.071',
          // consumo invertido: cuánto te prestarían con esa misma cuota a 5 años 24.1%
          // UF 15,59 / factor = monto consumo
          // factor = r*(1+r)^n / ((1+r)^n - 1), r=24.1/12/100, n=60
          con_equivalente_num: null, // calculado en JS
          ahorro_uf: '+UF 56,05',
          ahorro_pesos: '$2.233.072'
        },
        zona: 'Peñaflor',
        proy: [
          { img: 'public/proyectos-inmobiliarios/apartment1.jpg', n: 'Edificio Parque Central', t: 'Departamento 2D/2B', m: 45, precio: 'UF 1.850,00', pp: '$73.707.582', canon: 'UF 8,33', cp: '$331.681 / mes' },
          { img: 'public/proyectos-inmobiliarios/apartment2.jpg', n: 'Condominio Los Aromos', t: 'Departamento 1D/1B', m: 38, precio: 'UF 2.050,00', pp: '$81.675.526', canon: 'UF 9,23', cp: '$367.589 / mes' },
          { img: 'public/proyectos-inmobiliarios/house1.jpg', n: 'Casa Jardín Sur', t: 'Casa 3D/2B', m: 72, precio: 'UF 2.200,00', pp: '$87.651.784', canon: 'UF 9,90', cp: '$394.433 / mes' },
          { img: 'public/proyectos-inmobiliarios/house2.jpg', n: 'Villa El Roble', t: 'Casa 3D/2B', m: 85, precio: 'UF 2.380,00', pp: '$94.823.193', canon: 'UF 10,71', cp: '$426.745 / mes' },
          { img: 'public/proyectos-inmobiliarios/house3.jpg', n: 'Parque Residencial Norte', t: 'Casa 3D/3B', m: 90, precio: 'UF 2.480,00', pp: '$98.807.865', canon: 'UF 11,16', cp: '$444.674 / mes' },
        ]
      },
      {
        detalle: { pendiente: 'UF 803,69', otorgado: 'UF 1.684,80', dividendo: 'UF 10,62', tasa: '4.46%', cobertura: '80%' },
        val: {
          orig: 'UF 2.200,00', orig_fecha: '2013-08-16',

        },
        liq: {
          disponible_num: 3377.91,

          rehip_cuota: 'UF 21,30',

          con_equivalente_num: null,
          ahorro_uf: '+UF 76,07',

        },
        zona: 'Comuna 346',
        proy: [
          { img: 'public/proyectos-inmobiliarios/apartment1.jpg', n: 'Edificio Parque Central', t: 'Departamento 2D/2B', m: 48, precio: 'UF 2.600,00', pp: '$103.588.472', canon: 'UF 11,70', cp: '$466.148 / mes' },
          { img: 'public/proyectos-inmobiliarios/apartment2.jpg', n: 'Condominio Los Aromos', t: 'Departamento 1D/1B', m: 40, precio: 'UF 2.850,00', pp: '$113.548.902', canon: 'UF 12,83', cp: '$510.934 / mes' },
          { img: 'public/proyectos-inmobiliarios/house1.jpg', n: 'Casa Jardín Sur', t: 'Casa 3D/2B', m: 75, precio: 'UF 3.050,00', pp: '$121.517.246', canon: 'UF 13,73', cp: '$546.827 / mes' },
          { img: 'public/proyectos-inmobiliarios/house2.jpg', n: 'Villa El Roble', t: 'Casa 3D/2B', m: 88, precio: 'UF 3.200,00', pp: '$127.493.504', canon: 'UF 14,40', cp: '$573.720 / mes' },
          { img: 'public/proyectos-inmobiliarios/house3.jpg', n: 'Parque Residencial Norte', t: 'Casa 3D/3B', m: 92, precio: 'UF 3.370,00', pp: '$134.266.594', canon: 'UF 15,17', cp: '$604.379 / mes' },
        ]
      }
    ]

    // Calcula cuánto te prestarían en consumo con la misma cuota rehipoteca
    function calcConEquivalente(cuotaUF) {
      const r = 0.241 / 12
      const n = 60
      const factor = (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1)
      const monto = cuotaUF / factor
      return monto
    }

    CREDITOS.forEach(c => {
      c.liq.con_equivalente_num = calcConEquivalente(c.liq.rehip_cuota_num)
    })

    /* ── ESTADO ──────────────────────────────────────────── */
    let cur = 0
    const openSet = new Set()

    function selectCredito(i) {
      cur = i; openSet.clear()
      document.querySelectorAll('.credito-card').forEach((c, j) => c.classList.toggle('selected', i === j))
      document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', i === j))
      render()
    }

    function toggleProy(i) {
      const body = document.getElementById('pb' + i)
      const chev = document.getElementById('pc' + i)
      const trig = document.getElementById('pt' + i)
      if (openSet.has(i)) {
        openSet.delete(i); body.style.display = 'none'; chev.classList.remove('open'); trig.classList.remove('open')
      } else {
        openSet.add(i); body.style.display = 'grid'; chev.classList.add('open'); trig.classList.add('open')
      }
    }

    let tt
    function showToast(t) {
      clearTimeout(tt); document.querySelector('.toast')?.remove()
      const el = document.createElement('div')
      el.className = 'toast'
      el.textContent = `✅ Solicitud de "${t}" enviada — tu ejecutivo te contactará pronto`
      document.body.appendChild(el)
      tt = setTimeout(() => el.remove(), 3500)
    }

    function fmtUF(n) {
      return 'UF ' + n.toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    }
    function fmtPesos(uf) {
      return '$' + Math.round(uf * UF).toLocaleString('es-CL')
    }

    /* ── RENDER ──────────────────────────────────────────── */
    function render() {
      const c = CREDITOS[cur]
      const { detalle: d, val: v, liq: l, zona, proy } = c

      const conEq = l.con_equivalente_num
      const conEqUF = fmtUF(conEq)
      const conEqPesos = fmtPesos(conEq)
      const disponiblePesos = fmtPesos(l.disponible_num)
      const actualPesos = fmtPesos(v.actual_num)

      const pHTML = proy.map((p, i) => `
    <div class="proy-item">
      <div class="proy-trigger" id="pt${i}" onclick="toggleProy(${i})">
        <div class="proy-left">
          <img class="proy-thumb" src="${p.img}" alt="" role="presentation" onerror="this.style.display='none'">
          <div>
            <div class="proy-nombre">${p.n}</div>
            <div class="proy-sub">${p.t} · ${p.m} m² · ${zona}</div>
          </div>
        </div>
        <div class="proy-right">
          <div>
            <div class="proy-precio">${p.precio}</div>
            <div class="proy-canon">Canon ${p.canon}/mes</div>
          </div>
          <div class="proy-chevron" id="pc${i}">▼</div>
        </div>
      </div>
      <div class="proy-body" id="pb${i}" style="display:none">
        <img class="proy-body-img" src="${p.img}" alt="" role="presentation" onerror="this.style.display='none'">
        <div class="proy-stat">
          <div class="proy-stat-label">Precio estimado</div>
          <div class="proy-stat-val">${p.precio}</div>
          <div class="proy-stat-sub">${p.pp}</div>
        </div>
        <div class="proy-stat">
          <div class="proy-stat-label">Canon arriendo</div>
          <div class="proy-stat-val" style="color:var(--green)">${p.canon}</div>
          <div class="proy-stat-sub">${p.cp}</div>
        </div>
        <div class="proy-stat">
          <div class="proy-stat-label">Superficie</div>
          <div class="proy-stat-val">${p.m} m²</div>
          <div class="proy-stat-sub">${p.t}</div>
        </div>
        <div class="flujo">
          <div class="flujo-titulo">Flujo de caja mensual estimado</div>
          <div class="flujo-row"><span>+ Canon arriendo</span><span class="f-pos">${p.canon}</span></div>
          <div class="flujo-row"><span>− Cuota rehipoteca</span><span class="f-neg">−${p.q}</span></div>
          <div class="flujo-row"><span>= Ganancia neta</span><span class="f-pos">${p.g}</span></div>
        </div>
      </div>
    </div>`).join('')

      document.getElementById('content').innerHTML = `

    <!-- 1. DATOS BANCO -->

      <div class="tabla-row"><span class="tr-label">Monto otorgado</span><span class="tr-value">${d.otorgado}</span></div>
      <div class="tabla-row"><span class="tr-label">Dividendo mensual</span><span class="tr-value">${d.dividendo}</span></div>

          <div class="hero-powered">powered by Tinsa</div>
          <div class="hero-badge">Valorización ${v.actual_fecha}</div>

        <div class="hero-valor-uf">${v.actual}</div>
        <div class="hero-valor-pesos">${actualPesos}</div>
        <div class="hero-delta">↑ ${v.delta_uf} · ${v.delta_pct} más</div>
      </div>
      <div class="hero-tinsa-bottom">
        <div class="hero-bottom-left">
          <div class="hero-cta-label">Puedes obtener rehipotecando tu propiedad</div>
          <div class="hero-cta-monto">${l.disponible}</div>
          <div class="hero-cta-pesos">${disponiblePesos}</div>
          <div class="hero-cta-sub" style="margin-top:8px">80% valor actual − saldo · tasa ${l.rehip_tasa}% anual · 20 años</div>
        </div>
        <div class="hero-bottom-right">
          <div class="hero-br-label">¿Te interesa?</div>
          <button class="hero-br-cta" onclick="showToast('Rehipoteca')">Hablar con ejecutivo →</button>
        </div>
      </div>
    </div>

    <!-- 3. LIQUIDEZ INVERTIDA -->
    <div class="card-section">
      <div class="section-head">
        <div>
          <h3>¿Por qué rehipoteca y no consumo?</h3>
          <div class="section-sub">Pagando la misma cuota mensual, la diferencia es enorme</div>

      <div class="cuota-ancla">
        <div class="cuota-ancla-icon">📌</div>

        </div>

          <div class="liq-col-monto-label">Monto que obtienes</div>
          <div class="liq-col-monto">${l.disponible}</div>
          <div class="liq-col-pesos">${disponiblePesos}</div>
        </div>
      </div>

      <div class="liq-conclusion">
        <div class="liq-conclusion-text">
          💰 Pagando lo mismo cada mes, la rehipoteca te entrega más dinero
          <span>Diferencia calculada sobre monto disponible · tasa referencial BCCh feb 2026</span>
        </div>
        <div class="liq-conclusion-num">
          <div class="liq-conclusion-uf">${l.ahorro_uf} más</div>
          <div class="liq-conclusion-pesos">${l.ahorro_pesos} adicionales</div>
        </div>
      </div>
    </div>

    <!-- 4. ¿QUÉ QUIERES HACER? -->
    <div class="card-section">
      <div class="section-head">
        <div>
          <h3>¿Qué quieres hacer con tu propiedad?</h3>
          <div class="section-sub">Habla con tu ejecutivo y te ayudamos a financiarlo</div>
        </div>
      </div>
      <div class="acciones-grid">
        <div class="accion-card" onclick="showToast('Remodela tu hogar')">
          <div class="accion-icon">🔨</div>
          <div class="accion-titulo">Remodela tu hogar</div>
          <div class="accion-desc">Mejora los espacios de tu propiedad y aumenta su valor.</div>
          <button class="accion-btn">Contactar ejecutivo →</button>
        </div>
        <div class="accion-card" onclick="showToast('Amplía tu propiedad')">
          <div class="accion-icon">🏗️</div>
